<!doctype html><html lang="zh-TW"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:22px 26px;background:#fff;font-family:var(--font-body);color:var(--fg-1);}
.row{display:grid;grid-template-columns:130px 1fr;gap:16px;padding:10px 0;border-top:1px solid var(--gray-200);}
.row:first-child{border-top:none;padding-top:0;}
.label{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:.1em;text-transform:uppercase;padding-top:6px;}
.s1{font-family:var(--font-display);font-weight:900;font-size:64px;line-height:.95;letter-spacing:-.03em;}
.s2{font-family:var(--font-display);font-weight:700;font-size:40px;line-height:1.05;letter-spacing:-.01em;}
.s3{font-family:var(--font-deck);font-weight:700;font-size:28px;line-height:1.15;}
</style></head><body>
<div class="row"><div class="label">Display / 900</div><div class="s1">星河 STARRIVER</div></div>
<div class="row"><div class="label">Display / 700</div><div class="s2">保存 · 普及 · 發展</div></div>
<div class="row"><div class="label">Deck / 700</div><div class="s3">Science and Imagination of our Near Future</div></div>
</body></html>
