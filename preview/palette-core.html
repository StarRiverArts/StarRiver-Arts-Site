<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:#fff;font-family:var(--font-mono);font-size:10px;}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.s{border:1px solid var(--gray-200);border-radius:4px;overflow:hidden;}
.chip{height:70px;}
.meta{padding:8px 10px;background:#fff;display:flex;flex-direction:column;gap:2px;}
.n{font-weight:600;color:var(--fg-1);letter-spacing:.05em;text-transform:uppercase;}
.v{color:var(--fg-3);}
h3{margin:0 0 8px;font-family:var(--font-deck);font-weight:600;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--fg-2);}
section{margin-bottom:14px;}
</style></head><body>
<section>
<h3>Anchors</h3>
<div class="row">
  <div class="s"><div class="chip" style="background:#010100"></div><div class="meta"><span class="n">Void</span><span class="v">#010100</span></div></div>
  <div class="s"><div class="chip" style="background:#282829"></div><div class="meta"><span class="n">Graphite</span><span class="v">#282829</span></div></div>
  <div class="s"><div class="chip" style="background:#F4F2EC"></div><div class="meta"><span class="n">Bone</span><span class="v">#F4F2EC</span></div></div>
  <div class="s"><div class="chip" style="background:#FAFAFA;border-bottom:1px solid #eee"></div><div class="meta"><span class="n">Paper</span><span class="v">#FAFAFA</span></div></div>
  <div class="s"><div class="chip" style="background:#E88A2E"></div><div class="meta"><span class="n">SR Amber</span><span class="v">#E88A2E</span></div></div>
  <div class="s"><div class="chip" style="background:linear-gradient(100deg,#B9E4E8,#98A4B8 60%,transparent)"></div><div class="meta"><span class="n">Comet</span><span class="v">cyan→slate</span></div></div>
</div>
</section>
<section>
<h3>Co-brand accents</h3>
<div class="row">
  <div class="s"><div class="chip" style="background:#0072BC"></div><div class="meta"><span class="n">Formosa Signal</span><span class="v">#0072BC</span></div></div>
  <div class="s"><div class="chip" style="background:#1E6B3E"></div><div class="meta"><span class="n">PT Sign Green</span><span class="v">#1E6B3E</span></div></div>
  <div class="s"><div class="chip" style="background:#1F5EA8"></div><div class="meta"><span class="n">PT Sign Blue</span><span class="v">#1F5EA8</span></div></div>
  <div class="s"><div class="chip" style="background:#F0A94C"></div><div class="meta"><span class="n">PT Dusk</span><span class="v">#F0A94C</span></div></div>
  <div class="s"><div class="chip" style="background:#2D5A3D"></div><div class="meta"><span class="n">PT Jungle</span><span class="v">#2D5A3D</span></div></div>
  <div class="s"><div class="chip" style="background:#2DAEB7"></div><div class="meta"><span class="n">TERRA Ocean</span><span class="v">#2DAEB7</span></div></div>
</div>
</section>
</body></html>
