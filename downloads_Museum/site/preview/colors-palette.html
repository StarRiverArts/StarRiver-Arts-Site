<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Palette — four spatial roles</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<script type="text/javascript">
(function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "x5w0rbr4n3");
</script>
</head><body>
<div class="card frame">
  <div class="card__hd">
    <div>
      <h3>Palette · 四種空間角色</h3>
    </div>
    <div class="dim">CCT 5000K · CRI 95</div>
  </div>

  <div class="sw">
    <div class="sw__chip" style="background: var(--col-env)">
      <div>
        <div class="label">env · 周邊</div>
        <div class="mono">#689F38</div>
      </div>
    </div>
    <div class="sw__chip" style="background: var(--col-body)">
      <div>
        <div class="label">body · 本體</div>
        <div class="mono">#EEEEEE</div>
      </div>
    </div>
    <div class="sw__chip" style="background: var(--col-cool)">
      <div>
        <div class="label">cool · 冷調</div>
        <div class="mono">#E8EAF6</div>
      </div>
    </div>
    <div class="sw__chip" style="background: var(--col-warm)">
      <div>
        <div class="label">warm · 暖調</div>
        <div class="mono">#FFF8E1</div>
      </div>
    </div>
  </div>

  <p style="margin-top:18px; color: var(--ink-2); font-size:13px;">
    Four roles a VR-gallery surface can play. Apply as <em>targets</em>; the material × light card prescribes the corresponding actual values.
  </p>
</div>
