<!doctype html>
<!-- @dsCard group="Components" name="Material × light" subtitle="One material under four light conditions" viewport="700x320" --><html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Material × Light</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display:grid; grid-template-columns: 110px repeat(4, 1fr); gap:1px; background: var(--rule); border:1px solid var(--rule); }
  .grid > div { background: var(--paper); padding: 10px 12px; font-size:11.5px; }
  .grid .h { font: var(--t-label); letter-spacing: var(--letter-label); text-transform: uppercase; color: var(--ink-3); background: var(--paper-2); }
  .sample { aspect-ratio: 2.2; position:relative; padding:0; }
  .sample > i {
    position:absolute; inset:0; background: var(--col-body);
  }
  .sample.warm > i  { background: linear-gradient(115deg, #FFD18A 0%, rgba(255,209,138,0) 60%), var(--col-body); }
  .sample.neutral > i { background: var(--col-body); }
  .sample.cool > i  { background: linear-gradient(115deg, #BFD3EF 0%, rgba(191,211,239,0) 60%), var(--col-body); }
  .sample.gloss > i { background: linear-gradient(120deg, rgba(255,255,255,0.55), rgba(0,0,0,0.10) 60%, rgba(255,255,255,0.30)); background-color: #D6D4CD; }
  .legend { font-family: var(--font-mono); font-size: 10px; color: var(--ink-2); display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .legend b { color: var(--ink); }
</style><script type="text/javascript">
(function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "x5w0rbr4n3");
</script>
</head><body>
<div class="card frame">
  <div class="card__hd"><h3>Material × Light · 同一材質、四種光</h3><div class="dim">limestone matte</div></div>
  <div class="grid">
    <div class="h">light</div><div class="h">3200K warm</div><div class="h">5000K key</div><div class="h">5600K cool</div><div class="h">5000K + raking</div>
    <div class="h">render</div>
    <div class="sample warm"><i></i></div>
    <div class="sample neutral"><i></i></div>
    <div class="sample cool"><i></i></div>
    <div class="sample gloss"><i></i></div>
    <div class="h">actual</div>
    <div><span class="mono">#E5D9C2</span></div>
    <div><span class="mono">#E4E2DD</span></div>
    <div><span class="mono">#DDE0E6</span></div>
    <div><span class="mono">#E4E2DD ± 12%</span></div>
    <div class="h">adjust</div>
    <div>cool fill +20%</div>
    <div>—</div>
    <div>warm fill +10%</div>
    <div>shallow grazing only</div>
  </div>
  <div class="legend"><b>Rule</b> · default is 5000K · CCT changes always paired with fill compensation, never alone.</div>
</div>
