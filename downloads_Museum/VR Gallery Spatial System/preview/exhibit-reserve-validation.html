<!doctype html>
<!-- @dsCard group="Components" name="Reserve validation" subtitle="Plan + elevation worked example · Reserve M" viewport="700x460" --><html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Exhibit reserve · validation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  svg { display:block; width:100%; height:auto; background: var(--paper-2); }
  text { font-family: var(--font-mono); font-size: 10px; fill: var(--dim); letter-spacing: 0.04em; }
  .ink { fill: var(--ink); }
  .label { font: var(--t-label); letter-spacing: var(--letter-label); text-transform: uppercase; color: var(--ink-3); }
  .twin { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .twin > div > .label { display:block; margin-bottom: 6px; }
  .ckl { margin-top: 14px; display:grid; grid-template-columns: repeat(2,1fr); gap: 6px 16px; font-size: 12px; color: var(--ink-2); }
  .ckl b { color: var(--ink); font-weight: 500; }
  .ckl .ok::before { content: "✓ "; color: #467B1E; font-family: var(--font-mono); }
</style></head><body>
<div class="card frame">
  <div class="card__hd"><h3>Reserve M · 驗證範例</h3><div class="dim">60×60×100 · plan + elevation</div></div>
  <div class="twin">
    <div>
      <span class="label">平面圖 · plan</span>
      <svg viewBox="0 0 340 240">
        <!-- room walls -->
        <rect x="20" y="20" width="300" height="200" fill="none" stroke="#1A1A1A" stroke-width="2"/>
        <!-- 10cm grid -->
        <g stroke="#E0DED7" stroke-width="0.4">
          <line x1="20" y1="60" x2="320" y2="60"/>
          <line x1="20" y1="100" x2="320" y2="100"/>
          <line x1="20" y1="140" x2="320" y2="140"/>
          <line x1="20" y1="180" x2="320" y2="180"/>
          <line x1="60" y1="20" x2="60" y2="220"/>
          <line x1="100" y1="20" x2="100" y2="220"/>
          <line x1="140" y1="20" x2="140" y2="220"/>
          <line x1="180" y1="20" x2="180" y2="220"/>
          <line x1="220" y1="20" x2="220" y2="220"/>
          <line x1="260" y1="20" x2="260" y2="220"/>
          <line x1="300" y1="20" x2="300" y2="220"/>
        </g>
        <!-- reserve (60×60 cm = 24×24 px at 1:25 scale: 1 cm = 0.4 px → no, want larger; use 60cm = 30px) -->
        <rect x="240" y="100" width="30" height="30" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
        <text x="240" y="96" class="ink">RESERVE M</text>
        <!-- avatar (top view circle) -->
        <circle cx="160" cy="115" r="9" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
        <line x1="160" y1="115" x2="172" y2="115" stroke="#1A1A1A" stroke-width="0.8"/>
        <text x="142" y="138">AVATAR</text>
        <!-- viewing distance 150cm = 75px -->
        <line x1="170" y1="115" x2="240" y2="115" stroke="#B47B2E" stroke-width="0.6" stroke-dasharray="3 2"/>
        <text x="180" y="110">150 cm</text>
        <!-- clearance 90cm zone around reserve -->
        <rect x="195" y="55" width="120" height="120" fill="none" stroke="#B47B2E" stroke-width="0.5" stroke-dasharray="2 3"/>
        <text x="200" y="50">CLEARANCE 90</text>
        <!-- north arrow -->
        <g transform="translate(300,200)">
          <circle r="10" fill="none" stroke="#1A1A1A" stroke-width="0.8"/>
          <path d="M0 -10 L4 6 L0 2 L-4 6 Z" fill="#1A1A1A"/>
          <text x="-3" y="22" class="ink">N</text>
        </g>
      </svg>
    </div>
    <div>
      <span class="label">立面圖 · elevation</span>
      <svg viewBox="0 0 340 240">
        <line x1="20" y1="200" x2="320" y2="200" stroke="#1A1A1A" stroke-width="2"/>
        <line x1="300" y1="40" x2="300" y2="200" stroke="#1A1A1A" stroke-width="2"/>
        <!-- reserve on wall, 100cm tall, centroid at 130cm = y=200-130*1 = 70. scale 1cm=1px (over 200px tall canvas). Actually 200cm visible. Use 1cm = 1px. Reserve 100cm tall, centered on 130 → top 80, bottom 180. Width 60cm. -->
        <rect x="240" y="80" width="60" height="100" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
        <text x="245" y="76" class="ink">RESERVE M</text>
        <!-- centroid -->
        <line x1="20" y1="130" x2="320" y2="130" stroke="#B47B2E" stroke-width="0.6" stroke-dasharray="4 3"/>
        <text x="24" y="126" class="ink">EYE / CENTROID · 130</text>
        <!-- avatar at 150cm distance -->
        <g transform="translate(120,200)" stroke="#1A1A1A" stroke-width="1.2" fill="none">
          <line x1="0" y1="0" x2="0" y2="-110"/>
          <circle cx="0" cy="-115" r="8"/>
        </g>
        <!-- 15deg cone from eye to work -->
        <path d="M120 130 L240 113 L240 148 Z" fill="#689F38" fill-opacity="0.18" stroke="#B47B2E" stroke-width="0.6"/>
        <text x="155" y="118">±15°</text>
        <!-- floor mark -->
        <text x="24" y="214" class="ink">FLOOR · 0</text>
        <!-- distance dim -->
        <g stroke="#B47B2E" stroke-width="0.6">
          <line x1="120" y1="222" x2="240" y2="222"/>
          <line x1="120" y1="218" x2="120" y2="226"/>
          <line x1="240" y1="218" x2="240" y2="226"/>
        </g>
        <text x="158" y="236">150</text>
      </svg>
    </div>
  </div>
  <div class="ckl">
    <div class="ok"><b>Centroid at 130 cm</b> · eye-height match</div>
    <div class="ok"><b>Viewing distance 150 cm</b> · standard band</div>
    <div class="ok"><b>Clearance 90 cm</b> · all four sides clear</div>
    <div class="ok"><b>Within ±15° focus cone</b> · primary read</div>
  </div>
</div>
</body></html>
