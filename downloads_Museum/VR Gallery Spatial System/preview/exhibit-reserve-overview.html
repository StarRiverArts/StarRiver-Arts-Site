<!doctype html>
<!-- @dsCard group="Components" name="Exhibit reserves" subtitle="S / M / L / XL volumes · with 130 cm avatar" viewport="700x320" --><html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Exhibit reserves overview</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  .grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .item { border: 1px solid var(--rule); padding: 14px; }
  .item svg { display:block; width:100%; height:120px; background: var(--paper-2); }
  .item h4 { font: 500 16px/1 var(--font-en); margin: 12px 0 2px 0; }
  .item .cn { font-family: var(--font-tc); font-size: 11px; color: var(--ink-3); }
  .item .mono { font-family: var(--font-mono); font-size: 11px; color: var(--ink-2); margin-top: 6px; display: block; }
  .item text { font-family: var(--font-mono); font-size: 9px; fill: var(--dim); letter-spacing: 0.04em; }
</style><script type="text/javascript">
(function(c,l,a,r,i,t,y){
    c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
    t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
    y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "x5w0rbr4n3");
</script>
</head><body>
<div class="card frame">
  <div class="card__hd"><h3>Exhibit Reserve · 展品預留量體</h3><div class="dim">S · M · L · XL · in cm</div></div>

  <div class="grid">
    <!-- S — 30 × 30 × 50 (pedestal piece) -->
    <div class="item">
      <svg viewBox="0 0 160 110">
        <line x1="10" y1="100" x2="150" y2="100" stroke="#1A1A1A" stroke-width="1.5"/>
        <!-- avatar -->
        <g transform="translate(40,100)" stroke="#1A1A1A" stroke-width="1" fill="none">
          <line x1="0" y1="0" x2="0" y2="-75"/>
          <circle cx="0" cy="-80" r="5"/>
        </g>
        <!-- reserve -->
        <rect x="100" y="65" width="20" height="35" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
        <text x="100" y="60">30×30×50</text>
      </svg>
      <h4>S · Small</h4>
      <div class="cn">小型 · 文物・書冊</div>
      <span class="mono">30 × 30 × 50</span>
      <span class="mono" style="margin-top:2px;">clearance ≥ 60</span>
    </div>

    <!-- M — 60 × 60 × 100 (standard plinth or framed work) -->
    <div class="item">
      <svg viewBox="0 0 160 110">
        <line x1="10" y1="100" x2="150" y2="100" stroke="#1A1A1A" stroke-width="1.5"/>
        <g transform="translate(35,100)" stroke="#1A1A1A" stroke-width="1" fill="none">
          <line x1="0" y1="0" x2="0" y2="-75"/>
          <circle cx="0" cy="-80" r="5"/>
        </g>
        <rect x="90" y="40" width="40" height="60" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
        <text x="90" y="35">60×60×100</text>
      </svg>
      <h4>M · Medium</h4>
      <div class="cn">中型 · 雕塑・畫作</div>
      <span class="mono">60 × 60 × 100</span>
      <span class="mono" style="margin-top:2px;">clearance ≥ 90</span>
    </div>

    <!-- L — 120 × 120 × 150 -->
    <div class="item">
      <svg viewBox="0 0 160 110">
        <line x1="10" y1="100" x2="150" y2="100" stroke="#1A1A1A" stroke-width="1.5"/>
        <g transform="translate(30,100)" stroke="#1A1A1A" stroke-width="1" fill="none">
          <line x1="0" y1="0" x2="0" y2="-75"/>
          <circle cx="0" cy="-80" r="5"/>
        </g>
        <rect x="75" y="15" width="65" height="85" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
        <text x="75" y="10">120×120×150</text>
      </svg>
      <h4>L · Large</h4>
      <div class="cn">大型 · 裝置作品</div>
      <span class="mono">120 × 120 × 150</span>
      <span class="mono" style="margin-top:2px;">clearance ≥ 150</span>
    </div>

    <!-- XL — 240 × 240 × 240 (room-scale installation) -->
    <div class="item">
      <svg viewBox="0 0 160 110">
        <line x1="10" y1="100" x2="150" y2="100" stroke="#1A1A1A" stroke-width="1.5"/>
        <g transform="translate(20,100)" stroke="#1A1A1A" stroke-width="1" fill="none">
          <line x1="0" y1="0" x2="0" y2="-50"/>
          <circle cx="0" cy="-54" r="4"/>
        </g>
        <rect x="50" y="5" width="100" height="95" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
        <text x="50" y="3">240×240×240</text>
      </svg>
      <h4>XL · Room-scale</h4>
      <div class="cn">特大 · 沉浸裝置</div>
      <span class="mono">240 × 240 × 240</span>
      <span class="mono" style="margin-top:2px;">clearance ≥ 300</span>
    </div>
  </div>
</div>
</body></html>
