<!doctype html>
<!-- @dsCard group="UI Kit — Spatial Planner" name="Spatial Planner" subtitle="Plan + elevation · reserves · walls (occlusion) · lights (draggable in both views)" viewport="1400x800" -->
<html lang="zh-Hant">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1400"/>
<title>Spatial Planner · 空間規劃工具</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>

<!-- Thumbnail used by the offline bundle splash + no-JS fallback -->
<template id="__bundler_thumbnail">
  <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="#EEEEEE"/>
    <g transform="translate(40,40)">
      <!-- floor grid -->
      <g stroke="#C9C7C0" stroke-width="0.7">
        <line x1="0" y1="0" x2="120" y2="0"/>
        <line x1="0" y1="30" x2="120" y2="30"/>
        <line x1="0" y1="60" x2="120" y2="60"/>
        <line x1="0" y1="90" x2="120" y2="90"/>
        <line x1="0" y1="120" x2="120" y2="120"/>
        <line x1="0" y1="0" x2="0" y2="120"/>
        <line x1="30" y1="0" x2="30" y2="120"/>
        <line x1="60" y1="0" x2="60" y2="120"/>
        <line x1="90" y1="0" x2="90" y2="120"/>
        <line x1="120" y1="0" x2="120" y2="120"/>
      </g>
      <!-- room boundary -->
      <rect x="0" y="0" width="120" height="120" fill="none" stroke="#1A1A1A" stroke-width="2.5"/>
      <!-- reserve volumes -->
      <rect x="14" y="14" width="20" height="20" fill="#FAFAF7" stroke="#1A1A1A" stroke-width="1.2"/>
      <rect x="48" y="60" width="32" height="32" fill="#FAFAF7" stroke="#1A1A1A" stroke-width="1.2"/>
      <rect x="92" y="14" width="14" height="14" fill="#FAFAF7" stroke="#1A1A1A" stroke-width="1.2"/>
      <!-- light source -->
      <circle cx="64" cy="40" r="6" fill="#FFE7B5" stroke="#1A1A1A" stroke-width="1"/>
      <circle cx="64" cy="40" r="22" fill="#FFE7B5" fill-opacity="0.2" stroke="none"/>
      <!-- avatar -->
      <circle cx="20" cy="100" r="5" fill="none" stroke="#1A1A1A" stroke-width="1.2"/>
    </g>
  </svg>
</template>
<style>
  html, body { width: 1400px; margin: 0; background: var(--paper); color: var(--ink); }

  .app { padding: 28px 36px 48px; }

  .appbar {
    display: flex; justify-content: space-between; align-items: flex-end;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 14px; margin-bottom: 20px;
  }
  .appbar__id { font-size: 11px; letter-spacing: 0.10em; color: var(--ink-3); text-transform: uppercase; margin-bottom: 6px; }
  .appbar__t  { font: 300 36px/1 var(--font-en); letter-spacing: -0.01em; }
  .appbar__cn { font-family: var(--font-tc); font-weight: 400; font-size: 22px; color: var(--ink-2); margin-left: 12px; }
  .appbar__tools {
    display: flex; align-items: center; gap: 10px;
  }
  .appbar__hint { font-size: 12.5px; color: var(--ink-2); max-width: 260px; text-align: right; line-height: 1.5; }

  /* --- toolbar --- */
  .toolbar {
    display: flex; flex-wrap: wrap; gap: 16px 28px;
    padding: 16px 20px;
    border: 1px solid var(--rule); background: var(--paper-2);
    margin-bottom: 20px;
  }
  .tb__sec { min-width: 0; }
  .tb__sec--end { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; }
  .tb__label { font: 500 10px/1 var(--font-mono); letter-spacing: 0.10em; text-transform: uppercase; color: var(--ink-3); margin-bottom: 8px; }
  .tb__row { display: flex; gap: 8px; align-items: center; }
  .tb__hint { font-size: 11.5px; color: var(--ink-3); margin-top: 8px; font-family: var(--font-tc); }

  .chip {
    appearance: none; -webkit-appearance: none;
    border: 1px solid var(--rule-2); background: var(--paper);
    padding: 8px 12px; cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
    font-family: var(--font-en); color: var(--ink);
    transition: none;
  }
  .chip:hover { border-color: var(--ink); }
  .chip.is-on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .chip.is-on .chip__d { color: var(--rule); }
  .chip__l { font-weight: 500; font-size: 13px; line-height: 1; }
  .chip__d { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); line-height: 1; }
  .chip--sm { padding: 6px 10px; }
  .chip--sm .chip__l { font-size: 11px; }
  .chip--ghost { border-color: var(--rule); padding: 8px 12px; flex-direction: row; align-items: center; font-size: 11px; color: var(--ink-2); }
  .chip--ghost:hover { color: var(--ink); border-color: var(--ink-2); }
  .chip--ghost:disabled { color: var(--rule-2); border-color: var(--rule); cursor: default; }

  /* mode tabs — larger, harder-edged */
  .tab {
    appearance: none; -webkit-appearance: none;
    border: 1px solid var(--ink); background: var(--paper);
    padding: 8px 16px; cursor: pointer;
    display: flex; flex-direction: column; align-items: flex-start; gap: 4px;
    color: var(--ink); transition: none; min-width: 100px;
  }
  .tab__l { font: 500 14px/1 var(--font-en); }
  .tab__d { font-family: var(--font-tc); font-size: 11px; color: var(--ink-3); }
  .tab.is-on { background: var(--ink); color: var(--paper); }
  .tab.is-on .tab__d { color: var(--rule); }

  /* mount chips — wrap-friendly */
  .tb__row--wrap { flex-wrap: wrap; }
  .chip--mount { padding: 6px 8px; min-width: 78px; }
  .chip--mount .chip__g { font-size: 14px; line-height: 1; margin-bottom: 2px; }

  /* light-colour swatch chip */
  .chip--sw { padding: 6px 8px; flex-direction: column; gap: 4px; min-width: 60px; }
  .chip__sw {
    width: 100%; height: 12px; background: var(--sw); border: 1px solid var(--rule-2);
  }
  .chip--sw.is-on .chip__sw { border-color: var(--paper); }

  .counter { font-size: 11px; color: var(--ink-2); margin-right: 6px; }

  /* numeric input for light height */
  .zinput {
    appearance: textfield; -webkit-appearance: textfield;
    border: 1px solid var(--rule-2); background: var(--paper);
    padding: 8px 10px;
    font: 500 13px/1 var(--font-mono);
    color: var(--ink); width: 80px;
    text-align: right;
  }
  .zinput:focus { outline: 0; border-color: var(--ink); }

  /* --- grid --- */
  .grid {
    display: grid; grid-template-columns: 1.05fr 1.05fr 0.85fr; gap: 20px;
  }

  .canvas { border: 1px solid var(--rule); background: var(--paper); }
  .canvas__hd {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 16px; border-bottom: 1px solid var(--rule);
  }
  .canvas__t { font: 500 14px/1 var(--font-en); }
  .canvas__d { font-size: 11px; color: var(--ink-3); }

  .svg { display: block; width: 100%; height: auto; background: var(--paper-2); }
  .svg--plan.is-placing { cursor: crosshair; }

  .lbl {
    font-family: var(--font-mono); font-size: 9.5px;
    fill: var(--dim); letter-spacing: 0.04em;
  }
  .lbl.ink { fill: var(--ink); }

  .resv { cursor: grab; }
  .resv.is-sel { cursor: move; }
  .resv__l { font-family: var(--font-mono); font-size: 11px; fill: var(--ink); font-weight: 500; }

  /* --- validation panel --- */
  .panel { border: 1px solid var(--rule); background: var(--paper); display: flex; flex-direction: column; }
  .panel__hd {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 12px 16px; border-bottom: 1px solid var(--rule);
  }
  .panel__t { font: 500 14px/1 var(--font-en); }
  .panel__d { font-size: 11px; color: var(--ink-3); }
  .panel__empty {
    padding: 28px 18px; font-size: 12.5px; color: var(--ink-3); line-height: 1.6;
  }

  .checks { list-style: none; padding: 8px 0; margin: 0; flex: 1; }
  .check {
    display: grid; grid-template-columns: 24px 1fr; gap: 4px 10px;
    padding: 10px 16px; border-top: 1px solid var(--rule);
  }
  .check:first-child { border-top: 0; }
  .check__m { font-family: var(--font-mono); font-size: 14px; line-height: 1.2; }
  .check.ok .check__m { color: #467B1E; }
  .check.bad .check__m { color: #B33; }
  .check__l { font-size: 12.5px; color: var(--ink); margin-bottom: 2px; }
  .check__h { font-size: 11px; color: var(--ink-3); font-family: var(--font-mono); }

  .panel__foot { padding: 14px 16px; border-top: 1px solid var(--rule); background: var(--paper-2); }
  .kvline { display: flex; justify-content: space-between; padding: 3px 0; font-size: 11.5px; color: var(--ink-2); }
  .kvline .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; }
  .kvline .mono { font-family: var(--font-mono); color: var(--ink); }

</style>
