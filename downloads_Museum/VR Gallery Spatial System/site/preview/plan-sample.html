<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"/>
<title>Plan view sample</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  svg { display:block; width:100%; height:auto; background: var(--paper-2); }
  text { font-family: var(--font-mono); font-size: 9.5px; fill: var(--dim); letter-spacing: 0.04em; }
  .ink { fill: var(--ink); }
  .legend { display:grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-top: 12px; font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-2); }
  .legend i { display:inline-block; width:10px; height:10px; vertical-align:-1px; margin-right:6px; border:1px solid var(--rule); }
</style></head><body>
<div class="card frame">
  <div class="card__hd"><h3>Sample · 平面圖 Plan</h3><div class="dim">14 × 9 m · linear axis · 1:60</div></div>

  <!--
    Geometry (cm → px @ 1:60 → 1 cm = 0.46 px ; we use 1 m = 46 px).
    Room outer: 14 m × 9 m = 644 × 414 px. Pad 28 px each side. viewBox 700×470.
    Coordinate convention: (0,0) at top-left of viewBox.
    Walls drawn at 2 px stroke (cut edges). Partitions inside drawn at 2 px.
    Curves: R 60 / R 120 / R 240 cm = 28 / 55 / 110 px.
  -->
  <svg viewBox="0 0 700 470" preserveAspectRatio="xMidYMid meet">
    <!-- env zone outside east -->
    <rect x="672" y="28" width="20" height="414" fill="#689F38" fill-opacity="0.20"/>
    <!-- env zone outside south (garden bleed) -->
    <rect x="28" y="442" width="644" height="20" fill="#689F38" fill-opacity="0.12"/>

    <!-- 1m grid -->
    <g stroke="#E0DED7" stroke-width="0.4">
      <line x1="74"  y1="28" x2="74"  y2="442"/>
      <line x1="120" y1="28" x2="120" y2="442"/>
      <line x1="166" y1="28" x2="166" y2="442"/>
      <line x1="212" y1="28" x2="212" y2="442"/>
      <line x1="258" y1="28" x2="258" y2="442"/>
      <line x1="304" y1="28" x2="304" y2="442"/>
      <line x1="350" y1="28" x2="350" y2="442"/>
      <line x1="396" y1="28" x2="396" y2="442"/>
      <line x1="442" y1="28" x2="442" y2="442"/>
      <line x1="488" y1="28" x2="488" y2="442"/>
      <line x1="534" y1="28" x2="534" y2="442"/>
      <line x1="580" y1="28" x2="580" y2="442"/>
      <line x1="626" y1="28" x2="626" y2="442"/>
      <line x1="28" y1="74"  x2="672" y2="74"/>
      <line x1="28" y1="120" x2="672" y2="120"/>
      <line x1="28" y1="166" x2="672" y2="166"/>
      <line x1="28" y1="212" x2="672" y2="212"/>
      <line x1="28" y1="258" x2="672" y2="258"/>
      <line x1="28" y1="304" x2="672" y2="304"/>
      <line x1="28" y1="350" x2="672" y2="350"/>
      <line x1="28" y1="396" x2="672" y2="396"/>
    </g>

    <!-- room body fill -->
    <rect x="28" y="28" width="644" height="414" fill="#EEEEEE" fill-opacity="0.45"/>

    <!-- ENTRY at west: rounded portal (R 60) -->
    <!-- west wall split with a 90cm wide opening at y=180..222 (around mid-axis 235) -->
    <path d="M28 28 L28 200 A 27 27 0 0 1 55 173 L55 28 Z" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <path d="M28 442 L28 270 A 27 27 0 0 0 55 297 L55 442 Z" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="34" y="240" class="ink">ENTRY</text>

    <!-- North + South + East walls (continuous) -->
    <path d="M28 28 L672 28 L672 442 L28 442" fill="none" stroke="#1A1A1A" stroke-width="2"/>

    <!-- East: door + arch opening to garden (R 120) -->
    <line x1="672" y1="198" x2="672" y2="272" stroke="#F2F1EB" stroke-width="3"/>
    <path d="M672 198 A 55 55 0 0 0 617 253" fill="none" stroke="#1A1A1A" stroke-width="0.8"/>
    <text x="620" y="270">R 120</text>

    <!-- ============================================================
         SERPENTINE / LINEAR axis — central spine from west to east
         driven by curved partition walls (R 120, R 240).
         The spine runs along y = 235 (centre).
         ============================================================ -->

    <!-- Partition 1: north intrusion — arc from top wall down to centre, R 240 -->
    <!-- starts at (180, 28), curves down + east, ends at (300, 175) -->
    <path d="M180 28 L180 130 A 110 110 0 0 0 290 240 L290 240" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="195" y="170">R 240</text>

    <!-- Partition 2: south intrusion — arc from bottom wall up to centre, R 240 -->
    <path d="M380 442 L380 340 A 110 110 0 0 1 490 230 L490 230" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="395" y="324">R 240</text>

    <!-- Apse / curved alcove at north-east corner (R 120) -->
    <path d="M540 28 L540 90 A 55 55 0 0 1 595 145 L672 145" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="555" y="105">R 120</text>

    <!-- Apse at south-west (semicircular bay, R 120) for S × small works -->
    <path d="M28 360 L130 360 A 55 55 0 0 1 130 470" fill="none" stroke="#1A1A1A" stroke-width="0" />
    <path d="M85 305 A 55 55 0 0 1 85 415" fill="none" stroke="#1A1A1A" stroke-width="2"/>
    <text x="42" y="408">R 120</text>

    <!-- Free-form curved bench/partition between gallery 2 and 3 (R 60) -->
    <path d="M340 240 A 28 28 0 0 1 368 268 L368 280" fill="none" stroke="#1A1A1A" stroke-width="1.4"/>

    <!-- ============================================================
         AXIS / processional path (dashed, ochre) — what the visitor walks
         ============================================================ -->
    <path d="M48 235 C 130 235, 160 100, 240 95
             S 320 200, 330 235
             S 410 360, 470 348
             S 560 200, 640 235"
          fill="none" stroke="#B47B2E" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.85"/>
    <!-- axis arrowhead -->
    <path d="M640 235 L630 230 L630 240 Z" fill="#B47B2E"/>
    <text x="555" y="223">AXIS · 軸線</text>

    <!-- ============================================================
         RESERVES
         ============================================================ -->
    <!-- Gallery 1 (west alcove): two M wall-pieces on the north partition -->
    <rect x="80"  y="28" width="28" height="28" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
    <rect x="130" y="28" width="28" height="28" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="82" y="74" class="ink">M · M</text>

    <!-- South-west apse: small reserves arranged on the curve -->
    <g transform="translate(60,360)">
      <rect x="0"  y="0"  width="14" height="14" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
      <rect x="22" y="-22" width="14" height="14" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
      <rect x="36" y="6"  width="14" height="14" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1"/>
    </g>
    <text x="46" y="380" class="ink">S × 3</text>

    <!-- Centre gallery (L reserve on the spine) -->
    <rect x="234" y="78" width="55" height="55" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.4"/>
    <text x="240" y="148" class="ink">L · 120×120</text>

    <!-- South arc gallery: M reserve following the curve -->
    <rect x="412" y="378" width="28" height="28" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="412" y="372" class="ink">M</text>
    <rect x="450" y="356" width="28" height="28" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="450" y="350" class="ink">M</text>

    <!-- North-east apse: M -->
    <rect x="585" y="100" width="28" height="28" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.2"/>
    <text x="585" y="94" class="ink">M</text>

    <!-- East gallery: XL room-scale on east wall, set back from door -->
    <rect x="560" y="295" width="92" height="92" fill="#EEEEEE" stroke="#1A1A1A" stroke-width="1.4"/>
    <text x="568" y="346" class="ink">XL · 240×240</text>

    <!-- ============================================================
         Avatars along axis
         ============================================================ -->
    <g fill="none" stroke="#1A1A1A" stroke-width="1.2">
      <!-- entry -->
      <circle cx="70" cy="235" r="5"/>
      <line x1="70" y1="235" x2="76" y2="235"/>
      <!-- before L work -->
      <circle cx="265" cy="200" r="5"/>
      <line x1="265" y1="200" x2="265" y2="194"/>
      <!-- before south works -->
      <circle cx="428" cy="305" r="5"/>
      <line x1="428" y1="305" x2="428" y2="299"/>
      <!-- before XL -->
      <circle cx="500" cy="340" r="5"/>
      <line x1="500" y1="340" x2="506" y2="340"/>
    </g>

    <!-- Dimensions: overall 14 m × 9 m -->
    <g stroke="#B47B2E" stroke-width="0.6">
      <line x1="28" y1="18" x2="672" y2="18"/>
      <line x1="28" y1="14" x2="28" y2="22"/>
      <line x1="672" y1="14" x2="672" y2="22"/>
    </g>
    <text x="328" y="14" class="ink">14 000 mm</text>

    <g stroke="#B47B2E" stroke-width="0.6">
      <line x1="18" y1="28" x2="18" y2="442"/>
      <line x1="14" y1="28" x2="22" y2="28"/>
      <line x1="14" y1="442" x2="22" y2="442"/>
    </g>
    <text transform="translate(14,238) rotate(-90)" class="ink">9000</text>

    <!-- north arrow -->
    <g transform="translate(648,420)">
      <circle r="11" fill="#FAFAF7" stroke="#1A1A1A" stroke-width="0.8"/>
      <path d="M0 -10 L4 6 L0 3 L-4 6 Z" fill="#1A1A1A"/>
      <text x="-3" y="-14" class="ink">N</text>
    </g>

    <!-- scale bar -->
    <g transform="translate(28,460)">
      <line x1="0" y1="0" x2="184" y2="0" stroke="#1A1A1A" stroke-width="1"/>
      <line x1="0" y1="-3" x2="0" y2="3" stroke="#1A1A1A"/>
      <line x1="46" y1="-3" x2="46" y2="3" stroke="#1A1A1A"/>
      <line x1="92" y1="-3" x2="92" y2="3" stroke="#1A1A1A"/>
      <line x1="138" y1="-3" x2="138" y2="3" stroke="#1A1A1A"/>
      <line x1="184" y1="-3" x2="184" y2="3" stroke="#1A1A1A"/>
      <text x="-3" y="-7">0</text>
      <text x="40" y="-7">1</text>
      <text x="86" y="-7">2</text>
      <text x="132" y="-7">3</text>
      <text x="174" y="-7">4 m</text>
    </g>

    <!-- room labels -->
    <text x="115" y="232" class="ink">GALLERY 01</text>
    <text x="278" y="232" class="ink">GALLERY 02 · L</text>
    <text x="450" y="232" class="ink">GALLERY 03</text>
    <text x="572" y="270" class="ink">GALLERY 04 · XL</text>
  </svg>

  <div class="legend">
    <div><i style="background:#EEEEEE"></i>BODY · 本體</div>
    <div><i style="background:#689F3833"></i>ENV · 周邊</div>
    <div><i style="background:#FAFAF7;border-color:#B47B2E"></i>AXIS · 軸線 動線</div>
    <div>R 60 · R 120 · R 240</div>
  </div>
</div>
</body></html>
