<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-mono);font-size:10px;}
.r{display:grid;grid-template-columns:repeat(10,1fr);gap:0;border:1px solid var(--gray-200);border-radius:4px;overflow:hidden;}
.c{display:flex;flex-direction:column;}
.sw{height:90px;}
.m{padding:8px 6px;background:#fff;text-align:center;border-top:1px solid var(--gray-100);}
.n{display:block;font-weight:600;color:var(--fg-1);}
.v{display:block;color:var(--fg-3);font-size:9px;}
</style></head><body>
<div class="r">
<div class="c"><div class="sw" style="background:#141415"></div><div class="m"><span class="n">900</span><span class="v">#141415</span></div></div>
<div class="c"><div class="sw" style="background:#282829"></div><div class="m"><span class="n">800</span><span class="v">#282829</span></div></div>
<div class="c"><div class="sw" style="background:#3A3A3C"></div><div class="m"><span class="n">700</span><span class="v">#3A3A3C</span></div></div>
<div class="c"><div class="sw" style="background:#5A5A5C"></div><div class="m"><span class="n">600</span><span class="v">#5A5A5C</span></div></div>
<div class="c"><div class="sw" style="background:#8A8A8C"></div><div class="m"><span class="n">500</span><span class="v">#8A8A8C</span></div></div>
<div class="c"><div class="sw" style="background:#B6B6B7"></div><div class="m"><span class="n">400</span><span class="v">#B6B6B7</span></div></div>
<div class="c"><div class="sw" style="background:#D7D6D6"></div><div class="m"><span class="n">300</span><span class="v">#D7D6D6</span></div></div>
<div class="c"><div class="sw" style="background:#E7E6E4"></div><div class="m"><span class="n">200</span><span class="v">#E7E6E4</span></div></div>
<div class="c"><div class="sw" style="background:#F2F1EC"></div><div class="m"><span class="n">100</span><span class="v">#F2F1EC</span></div></div>
<div class="c"><div class="sw" style="background:#FAFAFA;border-right:1px solid #eee"></div><div class="m"><span class="n">050</span><span class="v">#FAFAFA</span></div></div>
</div>
</body></html>
