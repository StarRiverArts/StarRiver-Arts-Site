<!doctype html>
<html lang="zh-TW" class="lang-zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Project Taiwan — 星河 StarRiver Arts</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:#0f1512;color:#b8d8c4;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
html.lang-zh .en{display:none}
html.lang-en .zh{display:none}

/* subtle contour lines in bg */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(168,216,196,.04) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(168,216,196,.03) 60px);
}

nav{height:60px;flex-shrink:0;display:flex;align-items:center;padding:0 48px;border-bottom:1px solid rgba(168,216,196,.08);position:relative;z-index:1}
.nav-home{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(184,216,196,.45);text-decoration:none;transition:color 200ms}
.nav-home:hover{color:#b8d8c4}
.nav-home svg{width:10px;height:10px}
.lang-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(184,216,196,.3);background:none;border:1px solid rgba(168,216,196,.12);border-radius:2px;padding:4px 10px;cursor:pointer;margin-left:auto;transition:color 200ms}
.lang-btn:hover{color:#b8d8c4}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;position:relative;z-index:1}

/* Route shield decoration */
.shield-row{display:flex;gap:12px;justify-content:center;margin-bottom:32px}
.shield{display:flex;flex-direction:column;align-items:center;justify-content:center;width:44px;height:44px;background:var(--pt-sign-green);border-radius:2px;font-family:var(--font-display);font-weight:900;color:#fff;font-size:15px;line-height:1;opacity:.5}
.shield.active{opacity:1}
.shield-label{font-size:7px;letter-spacing:.1em;text-transform:uppercase;margin-top:2px;color:rgba(255,255,255,.7);font-family:var(--font-mono)}

.kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(168,216,196,.35);margin-bottom:20px}
.title{font-family:var(--font-display);font-weight:900;font-size:clamp(48px,7vw,96px);line-height:.92;letter-spacing:-.03em;color:#b8d8c4;margin-bottom:8px}
.title-sub{font-family:var(--font-body);font-size:13px;color:rgba(168,216,196,.4);letter-spacing:.04em;margin-bottom:32px}
.rule-green{width:40px;height:2px;background:var(--pt-sign-green);margin:0 auto 32px}
.body-text{font-family:var(--font-body);font-size:15px;color:rgba(168,216,196,.55);line-height:1.65;max-width:380px;margin-bottom:36px}
.home-link{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#b8d8c4;border:1px solid rgba(168,216,196,.18);border-radius:2px;padding:10px 18px;text-decoration:none;transition:background 200ms}
.home-link:hover{background:rgba(168,216,196,.08)}
.home-link svg{width:10px;height:10px}
</style>
</head>
<body>
<nav>
  <a class="nav-home" href="index.html">
    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="2.0"><path d="M9 5H1M4 2L1 5l3 3"/></svg>
    <span class="zh">首頁</span><span class="en">Home</span>
  </a>
  <button class="lang-btn" id="lb"><span class="zh">EN</span><span class="en">中</span></button>
</nav>
<main>
  <div class="shield-row">
    <div class="shield">9<div class="shield-label">省道</div></div>
    <div class="shield active">14甲<div class="shield-label">省道</div></div>
    <div class="shield">3<div class="shield-label">省道</div></div>
  </div>
  <div class="kicker"><span class="zh">02 · 臺灣場景系列</span><span class="en">02 · Taiwan Scene Series</span></div>
  <div class="title">Project T</div>
  <div class="title-sub zh">數位體驗</div>
  <div class="title-sub en">Digital Experience</div>
  <div class="rule-green"></div>
  <p class="body-text zh">VRChat 世界、台灣地景還原、VR 賽車俱樂部。</p>
  <p class="body-text zh">頁面建置中，敬請期待。</p>
  <p class="body-text en">VRChat worlds, Taiwan landscape environments, and VR Racing Club. Page under construction.</p>
  <a class="home-link" href="index.html">
    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H1M4 2L1 5l3 3"/></svg>
    <span class="zh">看看其他的</span><span class="en">Back to Hub</span>
  </a>
</main>
<script>
(function(){var h=document.documentElement,b=document.getElementById('lb'),s=localStorage.getItem('sr-lang')||'zh';function l(v){h.className='lang-'+v;h.lang=v==='zh'?'zh-TW':'en';localStorage.setItem('sr-lang',v)}l(s);b.addEventListener('click',function(){l(localStorage.getItem('sr-lang')==='zh'?'en':'zh')})})();
</script>
</body>
</html>
