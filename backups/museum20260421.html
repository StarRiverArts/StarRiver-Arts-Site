<!doctype html>
<html lang="zh-TW" class="lang-zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Museum — 星河 StarRiver Arts</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-body);background:#f0ede6;color:var(--sr-graphite);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column}
html.lang-zh .en{display:none}
html.lang-en .zh{display:none}

nav{height:60px;flex-shrink:0;display:flex;align-items:center;padding:0 48px;border-bottom:1px solid rgba(40,40,41,.08)}
.nav-home{display:flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gray-500);text-decoration:none;transition:color 200ms}
.nav-home:hover{color:var(--sr-graphite)}
.nav-home svg{width:10px;height:10px}
.lang-btn{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray-400);background:none;border:1px solid rgba(40,40,41,.15);border-radius:2px;padding:4px 10px;cursor:pointer;margin-left:auto;transition:color 200ms}
.lang-btn:hover{color:var(--sr-graphite)}

main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;position:relative}

/* decorative rule lines */
.rules{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.rule{position:absolute;background:rgba(40,40,41,.06)}
.rule-h{height:1px;left:0;right:0}
.rule-v{width:1px;top:0;bottom:0}

.kicker{font-family:var(--font-mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--gray-400);margin-bottom:24px}
.title{font-family:var(--font-display);font-weight:900;font-size:clamp(48px,7vw,96px);line-height:.92;letter-spacing:-.03em;color:var(--sr-graphite);margin-bottom:10px}
.subtitle{font-family:var(--font-body);font-size:13px;color:var(--gray-400);letter-spacing:.04em;margin-bottom:40px}
.rule-amber{width:40px;height:2px;background:var(--sr-amber);margin:0 auto 40px}
.body-text{font-family:var(--font-body);font-size:16px;color:var(--gray-600);line-height:1.65;max-width:400px;margin-bottom:36px}
.home-link{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--sr-graphite);border:1px solid rgba(40,40,41,.2);border-radius:2px;padding:10px 18px;text-decoration:none;transition:background 200ms}
.home-link:hover{background:rgba(40,40,41,.06)}
.home-link svg{width:10px;height:10px}
</style>
</head>
<body>
<nav>
  <a class="nav-home" href="index.html">
    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H1M4 2L1 5l3 3"/></svg>
    <span class="zh">首頁</span><span class="en">Home</span>
  </a>
  <button class="lang-btn" id="lb"><span class="zh">EN</span><span class="en">中</span></button>
</nav>
<main>
  <div class="rules">
    <div class="rule rule-h" style="top:30%"></div>
    <div class="rule rule-h" style="top:70%"></div>
    <div class="rule rule-v" style="left:20%"></div>
    <div class="rule rule-v" style="left:80%"></div>
  </div>
  <div class="kicker"><span class="zh">03 · 美術館</span><span class="en">03 · Museum</span></div>
  <div class="title">Museum</div>
  <div class="subtitle zh">美術館</div>
  <div class="rule-amber"></div>
  <p class="body-text zh">本美術館為數位藝文展示空間，預計於2027年開放。</p>
  <p class="body-text zh">展覽資訊、投稿計畫與數位藝術節目即將上線。</p>
  <p class="body-text en">Virtual Exhibition Space, 2027, TBA.</p>
  <p class="body-text en">Exhibition information, open call, and digital art programme — coming soon.</p>
  <a class="home-link" href="index.html">
    <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H1M4 2L1 5l3 3"/></svg>
    <span class="zh">看看其他的</span><span class="en">Back to Hub</span>
  </a>
</main>
<script>
(function(){var h=document.documentElement,b=document.getElementById('lb'),s=localStorage.getItem('sr-lang')||'zh';function l(v){h.className='lang-'+v;h.lang=v==='zh'?'zh-TW':'en';localStorage.setItem('sr-lang',v)}l(s);b.addEventListener('click',function(){l(localStorage.getItem('sr-lang')==='zh'?'en':'zh')})})();
</script>
</body>
</html>
