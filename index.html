<!doctype html>
<html lang="zh-TW" class="lang-zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>星河 StarRiver Arts</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);
  background:#0d0d0f;
  color:#f3eee3;
  -webkit-font-smoothing:antialiased;
}
html.lang-zh .en{display:none}
html.lang-en .zh{display:none}
.page{display:flex;flex-direction:column;height:100vh}

/* HEADER */
header{
  height:80px;flex-shrink:0;
  display:flex;align-items:center;padding:0 36px;
  border-bottom:1px solid rgba(255,255,255,.05);
  position:relative;z-index:20;
}
.hb{display:flex;align-items:center;gap:14px;margin-right:auto}
.hlogo{
  width:52px;height:52px;border-radius:50%;
  border:2px solid var(--sr-amber);overflow:hidden;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  animation:pulsering 4s ease-in-out infinite;
}
@keyframes pulsering{
  0%,100%{box-shadow:0 0 0 0 rgba(232,138,46,.4)}
  50%{box-shadow:0 0 0 6px rgba(232,138,46,0)}
}
.hlogo img{width:46px;height:46px;object-fit:contain;border-radius:50%}
.hw{font-family:var(--font-deck);font-weight:700;font-size:26px;letter-spacing:.04em;color:rgba(243,238,227,.9)}
.lb{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(243,238,227,.3);background:none;
  border:1px solid rgba(255,255,255,.1);border-radius:2px;
  padding:4px 10px;cursor:pointer;
  transition:color 250ms,border-color 250ms;
}
.lb:hover{color:rgba(243,238,227,.8);border-color:rgba(255,255,255,.25)}

/* STARS */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,4s) ease-in-out infinite var(--dl,0s)}
@keyframes twinkle{0%,100%{opacity:var(--lo,.06)}50%{opacity:var(--hi,.3)}}

/* COLUMNS */
.columns{
  flex:1;display:flex;overflow:hidden;
  position:relative;z-index:1;
}
.col{
  flex:1;position:relative;overflow:hidden;cursor:pointer;
  transition:flex 650ms cubic-bezier(.22,.61,.36,1);
  border-right:1px solid rgba(255,255,255,.04);
  display:flex;flex-direction:column;
}
.col:last-child{border-right:none}
.columns:has(.col:hover) .col{flex:.6}
.columns:has(.col:hover) .col:hover{flex:2.2}

/* faint accent top bar on hover */
.col::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  opacity:0;transition:opacity 400ms;
}
.col:hover::after{opacity:1}
.col-0::after{background:var(--sr-amber)}
.col-1::after{background:#a8d8c4}
.col-2::after{background:#dcdcdc}

/* large background number */
.col-num{
  position:absolute;
  bottom:-0.1em;right:-0.02em;
  font-family:var(--font-display);font-weight:900;
  font-size:min(22vw,22vh);
  line-height:1;letter-spacing:-.04em;
  pointer-events:none;user-select:none;
  transition:opacity 500ms,transform 500ms cubic-bezier(.22,.61,.36,1);
}
.col-0 .col-num{color:rgba(232,138,46,.04)}
.col-1 .col-num{color:rgba(168,216,196,.04)}
.col-2 .col-num{color:rgba(220,220,220,.04)}
.col:hover .col-num{opacity:.6;transform:scale(1.04) translateY(-1%)}

/* content */
.col-inner{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:36px 30px 40px;
}
.col-kicker{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;
  color:rgba(243,238,227,.2);margin-bottom:auto;
  transition:opacity 400ms;
}
.col:hover .col-kicker{opacity:.45}
.col-title{
  font-family:var(--font-display);font-weight:900;
  font-size:clamp(48px,5.5vw,84px);
  line-height:.92;letter-spacing:-.03em;
  margin-bottom:6px;
  transition:transform 500ms cubic-bezier(.22,.61,.36,1);
}
.col-0 .col-title{color:#ede4cc}
.col-1 .col-title{color:#b8d8c4}
.col-2 .col-title{color:#dcdcde}
.col:hover .col-title{transform:translateY(-5px)}
.col-zh{
  font-family:var(--font-body);font-size:14px;letter-spacing:.04em;
  margin-top:4px;opacity:.35;transition:opacity 400ms;
}
.col-0 .col-zh{color:#ede4cc}
.col-1 .col-zh{color:#b8d8c4}
.col-2 .col-zh{color:#dcdcde}
.col:hover .col-zh{opacity:.6}
.col-desc{
  font-family:var(--font-body);font-size:14px;line-height:1.55;
  max-width:220px;margin-top:12px;color:rgba(243,238,227,.4);
  opacity:0;transform:translateY(8px);
  transition:opacity 340ms 80ms,transform 340ms 80ms cubic-bezier(.22,.61,.36,1);
}
.col:hover .col-desc{opacity:1;transform:translateY(0)}
.col-btn{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;
  padding:10px 18px;border-radius:2px;margin-top:18px;width:fit-content;
  opacity:0;transform:translateY(10px);text-decoration:none;
  transition:opacity 290ms 140ms,transform 290ms 140ms cubic-bezier(.22,.61,.36,1),background 200ms;
}
.col:hover .col-btn{opacity:1;transform:translateY(0)}
.col-0 .col-btn{background:rgba(232,138,46,.15);color:#ede4cc;border:1px solid rgba(232,138,46,.3)}
.col-0 .col-btn:hover{background:rgba(232,138,46,.28)}
.col-1 .col-btn{background:rgba(70,160,100,.18);color:#b8d8c4;border:1px solid rgba(90,180,120,.25)}
.col-1 .col-btn:hover{background:rgba(70,160,100,.32)}
.col-2 .col-btn{background:rgba(210,210,215,.1);color:#dcdcde;border:1px solid rgba(210,210,215,.18)}
.col-2 .col-btn:hover{background:rgba(210,210,215,.22)}
.col-btn svg{width:10px;height:10px;flex-shrink:0}

/* CLICK OVERLAY */
.tov{position:fixed;inset:0;z-index:100;pointer-events:none;
     background:#0d0d0f;opacity:0;transition:opacity 500ms}
.tov.on{pointer-events:all;opacity:1}

/* MOBILE */
@media(max-width:680px){
  html,body{overflow:auto}
  .columns{flex-direction:column;height:auto}
  .col{flex:none!important;height:32vh;min-height:160px}
  .col-desc,.col-btn{opacity:1!important;transform:none!important}
  header{padding:0 20px}
  .hw{font-size:20px}
  .hlogo{width:38px;height:38px}
  .hlogo img{width:32px;height:32px}
}
</style>
</head>
<body>

<div class="stars" id="stars" aria-hidden="true"></div>
<div class="tov" id="tov"></div>

<div class="page">
<header>
  <div class="hb">
    <div class="hlogo">
      <img src="assets/logos/starriver-primary.png" alt="StarRiver Arts">
    </div>
    <span class="hw">星河 STARRIVER ARTS</span>
  </div>
  <button class="lb" id="lbtn"><span class="zh">EN</span><span class="en">中</span></button>
</header>

<div class="columns" id="colsWrap">

  <!-- Studio -->
  <div class="col col-0">
    <div class="col-num">01</div>
    <div class="col-inner">
      <div class="col-kicker">01 · Studio</div>
      <div style="flex:1"></div>
      <div class="col-title">Studio</div>
      <div class="col-zh">專案作品</div>
      <div class="col-desc">Selected works and capabilities</div>
      <a class="col-btn" href="studio.html">
        Enter
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 5h8M6 2l3 3-3 3"/></svg>
      </a>
    </div>
  </div>

  <!-- Project T / Play -->
  <div class="col col-1">
    <div class="col-num">02</div>
    <div class="col-inner">
      <div class="col-kicker">02 · Play</div>
      <div style="flex:1"></div>
      <div class="col-title">Project T</div>
      <div class="col-zh">數位體驗</div>
      <div class="col-desc">VR environments and Taiwan landscapes</div>
      <a class="col-btn" href="play.html">
        Enter
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 5h8M6 2l3 3-3 3"/></svg>
      </a>
    </div>
  </div>

  <!-- Museum -->
  <div class="col col-2">
    <div class="col-num">03</div>
    <div class="col-inner">
      <div class="col-kicker">03 · Museum</div>
      <div style="flex:1"></div>
      <div class="col-title">Museum</div>
      <div class="col-zh">美術館</div>
      <div class="col-desc">Exhibitions and conceptual works</div>
      <a class="col-btn" href="museum.html">
        Enter
        <svg viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 5h8M6 2l3 3-3 3"/></svg>
      </a>
    </div>
  </div>

</div>
</div>

<script>
(function(){
/* Language */
var html=document.documentElement;
var lbtn=document.getElementById('lbtn');
var saved=localStorage.getItem('sr-lang')||'zh';
function setLang(l){
  html.className='lang-'+l;
  html.lang=l==='zh'?'zh-TW':'en';
  localStorage.setItem('sr-lang',l);
}
setLang(saved);
lbtn.addEventListener('click',function(){
  setLang(localStorage.getItem('sr-lang')==='zh'?'en':'zh');
});

/* Stars */
var se=document.getElementById('stars');
var cnt=Math.floor(window.innerWidth*window.innerHeight/8000);
for(var i=0;i<cnt;i++){
  var s=document.createElement('div');
  s.className='star';
  var sz=Math.random()<.72?1:(Math.random()<.55?1.5:2);
  s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;top:'+(Math.random()*100)+'%;--d:'+(3+Math.random()*5.5).toFixed(1)+'s;--dl:-'+(Math.random()*7).toFixed(1)+'s;--lo:'+(Math.random()*.1+.03).toFixed(2)+';--hi:'+(Math.random()*.28+.1).toFixed(2);
  se.appendChild(s);
}

/* Click transition */
var tov=document.getElementById('tov');
document.querySelectorAll('.col-btn').forEach(function(btn){
  btn.addEventListener('click',function(e){
    e.preventDefault();
    var href=btn.getAttribute('href');
    tov.classList.add('on');
    setTimeout(function(){window.location.href=href;},520);
  });
});

/* :has() fallback */
if(!CSS.supports('selector(:has(a))')){
  var cols=document.querySelectorAll('.col');
  cols.forEach(function(col,i){
    col.addEventListener('mouseenter',function(){
      cols.forEach(function(c,j){c.style.flex=j===i?'2.2':'.6';});
    });
    col.addEventListener('mouseleave',function(){
      cols.forEach(function(c){c.style.flex='1';});
    });
  });
}
})();
</script>
</body>
</html>
