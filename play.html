<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Project T Redirect | 星河 StarRiver Arts</title>
  <meta http-equiv="refresh" content="0; url=play/">
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    * { box-sizing: border-box; }
    body {
      align-items: center;
      background:
        radial-gradient(circle at 80% 10%, rgba(31, 94, 168, 0.18), transparent 28%),
        radial-gradient(circle at 10% 20%, rgba(30, 107, 62, 0.18), transparent 26%),
        linear-gradient(180deg, #0d1411 0%, #151c19 100%);
      color: #f4f0e6;
      display: grid;
      font-family: var(--font-body);
      margin: 0;
      min-height: 100vh;
      padding: 24px;
      place-items: center;
    }
    .box {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      max-width: 560px;
      padding: 28px;
      width: 100%;
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(40px, 8vw, 72px);
      letter-spacing: -0.04em;
      line-height: 0.92;
      margin: 0 0 12px;
    }
    p {
      color: rgba(243, 238, 227, 0.76);
      font-size: 16px;
      line-height: 1.7;
      margin: 0 0 16px;
    }
    a {
      color: #dff8fb;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.14em;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
  <script>
    window.location.replace("play/");
  </script>
</head>
<body>
  <main class="box">
    <h1>Project T</h1>
    <p>正在導向新的 `play/` 入口頁面。</p>
    <p>Redirecting to the new `play/` entry path.</p>
    <a href="play/">Continue to Project T</a>
  </main>
</body>
</html>
